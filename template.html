<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Template</title>

  <!-- =============================
       BASIC STYLING (SIMPLE LAYOUT)
       ============================= -->
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    /* MAIN 2-COLUMN LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 70% 30%;
      gap: 20px;
      padding: 20px;
    }

    /* LEFT MAIN CONTENT AREA */
    .main-content {
      padding: 10px;
    }

    /* RIGHT SIDEBAR AREA */
    .sidebar {
      padding: 10px;
      background: #f5f5f5;
    }
  </style>
</head>
<body>

  <!-- =============================
       HEADER (AUTO LOADED)
       ============================= -->
  <div data-include="partials/header.html"></div>

  <!-- =============================
       NAVIGATION (AUTO LOADED)
       ============================= -->
  <div data-include="partials/nav.html"></div>

  <!-- =============================
       MAIN PAGE LAYOUT
       ============================= -->
  <div class="layout">

    <!-- =============================
         LEFT SIDE (YOUR PAGE CONTENT)
         THIS IS THE ONLY PART YOU CHANGE
         ============================= -->
    <div class="main-content">

      <!-- ✏️ EDIT BELOW THIS LINE -->

      <h2>This is where the main theme goes.</h2>

      <p>
        Replace this with:
        - audio player
        - blog post
        - images
        - video
        - anything you want
      </p>

      <!-- ✏️ EDIT ABOVE THIS LINE -->

    </div>

    <!-- =============================
         RIGHT SIDE (SIDEBAR - SHARED)
         ============================= -->
    <div class="sidebar">
      <div data-include="partials/sidebar.html"></div>
    </div>

  </div>

  <!-- =============================
       FOOTER (AUTO LOADED)
       ============================= -->
  <div data-include="partials/footer.html"></div>

  <!-- LOAD THE INCLUDE SCRIPT -->
  <script src="js/includes.js"></script>

</body>
</html>
